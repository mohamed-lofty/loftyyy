<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heeeelllllooooo from Loftyyyy</title>

    <!-- Google Fonts: Stylish display font + smooth body font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a14;
            --text-glow: #ff6bcb;
            --text-glow-2: #4ade80;
            --text-glow-3: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 40% 50%, rgba(255, 107, 203, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 60% 50%, rgba(74, 222, 128, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 40%, rgba(96, 165, 250, 0.04) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            padding: 1.5rem;
        }

        /* Subtle animated background particles */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* Main text container */
        .text-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 90vw;
        }

        /* The animated greeting */
        .animated-text {
            font-family: 'Fredoka One', 'Segoe UI', system-ui, sans-serif;
            font-size: clamp(2.2rem, 6vw, 5.5rem);
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: 0.02em;
            color: #ffffff;
            text-align: center;
            cursor: default;
            user-select: none;

            /* Multi-layer glow effect */
            text-shadow:
                0 0 10px rgba(255, 107, 203, 0.6),
                0 0 30px rgba(255, 107, 203, 0.4),
                0 0 60px rgba(255, 107, 203, 0.25),
                0 0 100px rgba(74, 222, 128, 0.2),
                0 0 140px rgba(96, 165, 250, 0.15);

            /* Combined animations */
            animation:
                gentleBounce 2.5s ease-in-out infinite,
                glowPulse 3s ease-in-out infinite,
                colorShift 8s ease-in-out infinite;
        }

        /* Gentle bouncing motion */
        @keyframes gentleBounce {
            0%,
            100% {
                transform: translateY(0px);
            }
            15% {
                transform: translateY(-18px);
            }
            30% {
                transform: translateY(0px);
            }
            45% {
                transform: translateY(-8px);
            }
            60% {
                transform: translateY(0px);
            }
            75% {
                transform: translateY(-3px);
            }
            90% {
                transform: translateY(0px);
            }
        }

        /* Glow intensity pulse */
        @keyframes glowPulse {
            0%,
            100% {
                text-shadow:
                    0 0 10px rgba(255, 107, 203, 0.6),
                    0 0 30px rgba(255, 107, 203, 0.4),
                    0 0 60px rgba(255, 107, 203, 0.25),
                    0 0 100px rgba(74, 222, 128, 0.2),
                    0 0 140px rgba(96, 165, 250, 0.15);
            }
            50% {
                text-shadow:
                    0 0 20px rgba(255, 107, 203, 0.9),
                    0 0 50px rgba(255, 107, 203, 0.6),
                    0 0 80px rgba(255, 107, 203, 0.4),
                    0 0 130px rgba(74, 222, 128, 0.35),
                    0 0 180px rgba(96, 165, 250, 0.25);
            }
        }

        /* Subtle color shift between pink/green/blue */
        @keyframes colorShift {
            0%,
            100% {
                color: #ffffff;
            }
            25% {
                color: #ffe0f0;
            }
            50% {
                color: #e0ffe8;
            }
            75% {
                color: #e0ecff;
            }
        }

        /* Subtitle / tagline */
        .subtitle {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            color: rgba(255, 255, 255, 0.55);
            margin-top: 1.2rem;
            letter-spacing: 0.06em;
            font-weight: 400;
            animation: fadeInUp 1.2s ease-out 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Sparkle dots around the text */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ffffff;
            pointer-events: none;
            animation: sparkleBurst 1.8s ease-in-out infinite;
            box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.7);
        }

        @keyframes sparkleBurst {
            0%,
            100% {
                opacity: 0;
                transform: scale(0) translate(0, 0);
            }
            50% {
                opacity: 1;
                transform: scale(1.4) translate(var(--sx), var(--sy));
            }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .animated-text {
                font-size: clamp(1.8rem, 8vw, 3rem);
                letter-spacing: 0.01em;
            }

            .subtitle {
                font-size: 0.85rem;
                margin-top: 0.8rem;
            }
        }

        @media (max-width: 380px) {
            .animated-text {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Floating background particles -->
    <div class="bg-particles" id="particles" aria-hidden="true"></div>

    <!-- Main centered text -->
    <div class="text-container">
        <h1 class="animated-text">Heeeelllllooooo<br>from Loftyyyy</h1>
        <p class="subtitle">✨ glad you're here ✨</p>
    </div>

    <!-- Sparkle accents -->
    <div id="sparkles" aria-hidden="true"></div>

    <script>
        // ============================================
        // BACKGROUND FLOATING PARTICLES
        // ============================================
        (function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 35;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                // Random size between 2px and 6px
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';

                // Random horizontal position
                particle.style.left = Math.random() * 100 + '%';

                // Random animation duration between 6s and 18s
                const duration = Math.random() * 12 + 6;
                particle.style.animationDuration = duration + 's';

                // Random delay so they don't all start together
                particle.style.animationDelay = Math.random() * duration + 's';

                // Slightly varied colors
                const colors = [
                    'rgba(255,107,203,0.7)',
                    'rgba(74,222,128,0.6)',
                    'rgba(96,165,250,0.6)',
                    'rgba(255,255,255,0.5)',
                ];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];

                container.appendChild(particle);
            }
        })();

        // ============================================
        // SPARKLE EFFECTS AROUND THE TEXT
        // ============================================
        (function createSparkles() {
            const sparklesContainer = document.getElementById('sparkles');
            const sparkleCount = 12;

            for (let i = 0; i < sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');

                // Position sparkles around the text area
                const angle = (Math.PI * 2 * i) / sparkleCount;
                const radius = 80 + Math.random() * 120;
                const sx = Math.cos(angle) * radius;
                const sy = Math.sin(angle) * radius;

                sparkle.style.setProperty('--sx', sx + 'px');
                sparkle.style.setProperty('--sy', sy + 'px');
                sparkle.style.position = 'fixed';
                sparkle.style.top = '50%';
                sparkle.style.left = '50%';
                sparkle.style.marginLeft = '-3px';
                sparkle.style.marginTop = '-3px';
                sparkle.style.animationDelay = Math.random() * 1.8 + 's';
                sparkle.style.animationDuration = (1.5 + Math.random() * 2) + 's';

                sparklesContainer.appendChild(sparkle);
            }
        })();

        // ============================================
        // INTERACTIVE: CLICK ANYWHERE TO TRIGGER BURST
        // ============================================
        document.addEventListener('click', function(e) {
            const burstCount = 8;
            const container = document.getElementById('sparkles');

            for (let i = 0; i < burstCount; i++) {
                const spark = document.createElement('div');
                spark.classList.add('sparkle');
                spark.style.position = 'fixed';
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.marginLeft = '-3px';
                spark.style.marginTop = '-3px';
                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '999';

                const angle = (Math.PI * 2 * i) / burstCount;
                const distance = 40 + Math.random() * 60;
                spark.style.setProperty('--sx', Math.cos(angle) * distance + 'px');
                spark.style.setProperty('--sy', Math.sin(angle) * distance + 'px');
                spark.style.animationDuration = '1s';
                spark.style.animationDelay = '0s';

                container.appendChild(spark);

                // Remove after animation
                setTimeout(() => spark.remove(), 1200);
            }
        });

        console.log('🌈 Heeeelllllooooo from Loftyyyy — welcome!');
    </script>
</body>
</html>
